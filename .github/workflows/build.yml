name: Build

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "What to build"
        required: true
        default: both
        type: choice
        options:
          - desktop
          - android
          - both
      android_build_type:
        description: "Android build type (ignored if not building android)"
        required: true
        default: release
        type: choice
        options:
          - debug
          - release
      branch:
        description: "Branch to build from"
        required: true
        default: "main"
        type: string
      tag:
        description: "Tag (e.g. v0.6.2) — used as desktop release tag and to attach Android release APK; leave blank to skip publishing"
        required: false
        type: string

jobs:
  # ---------- Desktop (Tauri) ----------
  desktop-create-release:
    if: inputs.targets == 'desktop' || inputs.targets == 'both'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.resolve-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: resolve version
        id: resolve-version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: create release
        id: create-release
        uses: actions/github-script@v6
        env:
          RELEASE_TAG: ${{ steps.resolve-version.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Suvarix ${tag}`,
              body: `## Suvarix ${tag}\n\n| Platform | File |\n|----------|------|\n| Windows | \`.msi\` installer |\n| macOS ARM | \`.dmg\` (Apple Silicon) |\n| macOS Intel | \`.dmg\` (Intel) |\n| Linux | \`.AppImage\` / \`.deb\` |`,
              draft: true,
              prerelease: false,
              target_commitish: '${{ inputs.branch }}'
            })
            return data.id

  desktop-build-tauri:
    needs: desktop-create-release
    if: inputs.targets == 'desktop' || inputs.targets == 'both'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config

      - name: install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.desktop-create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  desktop-publish-release:
    if: inputs.targets == 'desktop' || inputs.targets == 'both'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [desktop-create-release, desktop-build-tauri]

    steps:
      - name: publish release
        uses: actions/github-script@v6
        env:
          release_id: ${{ needs.desktop-create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })

  # ---------- Android ----------
  android-debug:
    if: (inputs.targets == 'android' || inputs.targets == 'both') && inputs.android_build_type == 'debug'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android,aarch64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK_HOME
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate Android project skeleton
        run: pnpm tauri android init

      - name: Set APK output file name
        run: |
          python3 - <<'PY'
          import pathlib

          p = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          src = p.read_text().replace("\r\n", "\n")

          output_block = (
              '    applicationVariants.all {\n'
              '        outputs\n'
              '            .map { it as com.android.build.gradle.internal.api.BaseVariantOutputImpl }\n'
              '            .forEach { output ->\n'
              '                output.outputFileName = "suvarix-${baseName}.apk"\n'
              '            }\n'
              '    }\n'
          )
          src = src.replace("android {\n", "android {\n" + output_block, 1)

          assert "applicationVariants.all {" in src, "applicationVariants block not inserted"

          p.write_text(src)
          PY

      - name: Build Android debug APK
        run: pnpm tauri android build --debug --target x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: suvarix-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  android-release:
    if: (inputs.targets == 'android' || inputs.targets == 'both') && inputs.android_build_type == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android,aarch64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK_HOME
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Generate Android project skeleton
        run: pnpm tauri android init

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > src-tauri/gen/android/keystore.properties <<EOF
          password=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$RUNNER_TEMP/release.keystore
          EOF

      - name: Wire signingConfig into build.gradle.kts
        run: |
          python3 - <<'PY'
          import pathlib

          p = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          src = p.read_text().replace("\r\n", "\n")

          src = src.replace(
              "import java.util.Properties\n",
              "import java.util.Properties\nimport java.io.FileInputStream\n",
              1,
          )

          signing_block = (
              '    signingConfigs {\n'
              '        create("release") {\n'
              '            val keystorePropertiesFile = rootProject.file("keystore.properties")\n'
              '            val keystoreProperties = Properties()\n'
              '            if (keystorePropertiesFile.exists()) {\n'
              '                keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n'
              '            }\n'
              '            keyAlias = keystoreProperties["keyAlias"] as String\n'
              '            keyPassword = keystoreProperties["password"] as String\n'
              '            storeFile = file(keystoreProperties["storeFile"] as String)\n'
              '            storePassword = keystoreProperties["password"] as String\n'
              '        }\n'
              '    }\n'
          )
          src = src.replace("android {\n", "android {\n" + signing_block, 1)

          src = src.replace(
              'getByName("release") {\n            isMinifyEnabled = true',
              'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")\n            isMinifyEnabled = true',
              1,
          )

          output_block = (
              '    applicationVariants.all {\n'
              '        outputs\n'
              '            .map { it as com.android.build.gradle.internal.api.BaseVariantOutputImpl }\n'
              '            .forEach { output ->\n'
              '                output.outputFileName = "suvarix-${baseName}.apk"\n'
              '            }\n'
              '    }\n'
          )
          src = src.replace("android {\n", "android {\n" + output_block, 1)

          assert "import java.io.FileInputStream" in src, "FileInputStream import not inserted"
          assert "signingConfigs {" in src, "signingConfigs block not inserted"
          assert 'signingConfig = signingConfigs.getByName("release")' in src, "release buildType not wired to signingConfig"
          assert "applicationVariants.all {" in src, "applicationVariants block not inserted"

          p.write_text(src)
          PY

      - name: Build signed release APK
        run: pnpm tauri android build --target aarch64 --target x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: suvarix-release-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

      - name: Attach APK to GitHub Release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
