name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0) — must exist in the repo"
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and upload to GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "FinFolio ${{ inputs.tag }}"
          releaseBody: |
            ## FinFolio ${{ inputs.tag }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` installer |
            | macOS ARM | `.dmg` (Apple Silicon) |
            | macOS Intel | `.dmg` (Intel) |
            | Linux    | `.AppImage` / `.deb` |

            ### What's New
            See [commits](https://github.com/${{ github.repository }}/commits/${{ inputs.tag }}) for full history.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
